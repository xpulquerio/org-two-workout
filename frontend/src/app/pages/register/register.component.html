<div class="bg-background-light dark:bg-background-dark min-h-screen text-[#111814] dark:text-white font-display">
  <div class="min-h-screen w-full max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6 px-4 py-6 sm:px-6 sm:py-10">
    <section class="hidden lg:flex flex-col justify-between rounded-3xl bg-gradient-to-br from-primary/15 to-slate-100 dark:from-primary/10 dark:to-[#1a241d] p-10 border border-primary/20">
      <div>
        <p class="text-xs uppercase tracking-[0.2em] text-slate-500 dark:text-slate-300">GymTracker</p>
        <h1 class="mt-4 text-4xl font-bold leading-tight">Create your account and start training smarter.</h1>
        <p class="mt-4 text-slate-600 dark:text-slate-300">Build routines, track results and keep your streak alive.</p>
      </div>
      <div class="flex items-center gap-3 text-sm text-slate-600 dark:text-slate-300">
        <span class="material-symbols-outlined text-primary">fitness_center</span>
        One place for your complete gym routine.
      </div>
    </section>

    <section class="w-full max-w-md lg:max-w-none mx-auto bg-white/80 dark:bg-[#1a221d]/90 rounded-3xl border border-gray-200 dark:border-white/10 shadow-xl p-6 sm:p-8 lg:p-10">
      <div class="flex flex-col items-center justify-center pb-4">
        <div class="w-16 h-16 bg-primary/20 rounded-full flex items-center justify-center mb-5">
          <span class="material-symbols-outlined text-primary text-4xl">fitness_center</span>
        </div>
        <h1 class="text-3xl font-bold tracking-tight text-center text-[#111814] dark:text-white">Create Account</h1>
        <p class="text-base font-normal text-gray-500 dark:text-gray-400 text-center mt-2">Join GymTracker today.</p>
      </div>

      <form (submit)="register()" class="flex flex-col gap-4 w-full">
        <label class="flex flex-col w-full">
          <p class="text-sm font-medium leading-normal pb-2 text-[#111814] dark:text-white">Full Name</p>
          <input
            class="form-input flex w-full rounded-lg border border-[#e0e0e0] dark:border-[#3b5444] bg-white dark:bg-[#1b2720] px-4 py-3 text-base text-[#111814] dark:text-white placeholder:text-gray-400 dark:placeholder:text-[#9cbaa7] focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors"
            placeholder="Enter your full name" type="text" [(ngModel)]="fullName" name="fullName" required />
        </label>

        <label class="flex flex-col w-full">
          <p class="text-sm font-medium leading-normal pb-2 text-[#111814] dark:text-white">Username</p>
          <input
            class="form-input flex w-full rounded-lg border border-[#e0e0e0] dark:border-[#3b5444] bg-white dark:bg-[#1b2720] px-4 py-3 text-base text-[#111814] dark:text-white placeholder:text-gray-400 dark:placeholder:text-[#9cbaa7] focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors"
            placeholder="Choose a username" type="text" [(ngModel)]="username" name="username" required />
        </label>

        <label class="flex flex-col w-full">
          <p class="text-sm font-medium leading-normal pb-2 text-[#111814] dark:text-white">Email Address</p>
          <input
            class="form-input flex w-full rounded-lg border border-[#e0e0e0] dark:border-[#3b5444] bg-white dark:bg-[#1b2720] px-4 py-3 text-base text-[#111814] dark:text-white placeholder:text-gray-400 dark:placeholder:text-[#9cbaa7] focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors"
            placeholder="Enter your email" type="email" [(ngModel)]="email" name="email" required />
        </label>

        <label class="flex flex-col w-full">
          <p class="text-sm font-medium leading-normal pb-2 text-[#111814] dark:text-white">Password</p>
          <input
            class="form-input flex w-full rounded-lg border border-[#e0e0e0] dark:border-[#3b5444] bg-white dark:bg-[#1b2720] px-4 py-3 text-base text-[#111814] dark:text-white placeholder:text-gray-400 dark:placeholder:text-[#9cbaa7] focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors"
            placeholder="Create a password" type="password" [(ngModel)]="password" name="password" required />
        </label>

        <label class="flex flex-col w-full">
          <p class="text-sm font-medium leading-normal pb-2 text-[#111814] dark:text-white">Confirm Password</p>
          <input
            class="form-input flex w-full rounded-lg border border-[#e0e0e0] dark:border-[#3b5444] bg-white dark:bg-[#1b2720] px-4 py-3 text-base text-[#111814] dark:text-white placeholder:text-gray-400 dark:placeholder:text-[#9cbaa7] focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors"
            placeholder="Confirm your password" type="password" [(ngModel)]="password2" name="password2" required />
        </label>

        <button
          class="mt-2 flex w-full items-center justify-center rounded-lg bg-primary py-3.5 text-base font-bold text-white shadow-lg shadow-primary/20 hover:bg-primary/90 focus:outline-none focus:ring-4 focus:ring-primary/20 transition-all active:scale-[0.98]"
          type="submit">
          Register
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-sm text-gray-500 dark:text-gray-400">
          Already have an account?
          <a class="font-medium text-primary hover:text-primary/80 transition-colors" routerLink="/login">Log In</a>
        </p>
      </div>
    </section>
  </div>
</div>
