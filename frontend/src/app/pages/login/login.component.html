<div class="bg-background-light dark:bg-background-dark min-h-screen text-[#111318] dark:text-white font-display">
  <div class="min-h-screen w-full max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6 px-4 py-6 sm:px-6 sm:py-10">
    <section class="hidden lg:flex flex-col justify-between rounded-3xl bg-gradient-to-br from-primary/15 to-slate-100 dark:from-primary/10 dark:to-[#1a241d] p-10 border border-primary/20">
      <div>
        <p class="text-xs uppercase tracking-[0.2em] text-slate-500 dark:text-slate-300">GymTracker</p>
        <h1 class="mt-4 text-4xl font-bold leading-tight">Track every workout and build consistency.</h1>
        <p class="mt-4 text-slate-600 dark:text-slate-300">Your training history, streak and routines in one place.</p>
      </div>
      <div class="flex items-center gap-3 text-sm text-slate-600 dark:text-slate-300">
        <span class="material-symbols-outlined text-primary">monitoring</span>
        Keep progressing every day.
      </div>
    </section>

    <section class="w-full max-w-md lg:max-w-none mx-auto bg-white/80 dark:bg-[#1a221d]/90 rounded-3xl border border-gray-200 dark:border-white/10 shadow-xl p-6 sm:p-8 lg:p-10">
      <div class="flex flex-col items-center mb-8">
        <div
          class="h-16 w-16 bg-gradient-to-br from-primary/20 to-primary/5 rounded-2xl flex items-center justify-center text-primary mb-4 ring-1 ring-primary/30 shadow-[0_0_30px_rgba(12,185,78,0.15)] relative">
          <span class="material-symbols-outlined text-[34px]">fitness_center</span>
        </div>
        <h1 class="text-3xl font-bold mb-2">GymTracker</h1>
        <p class="text-gray-500 dark:text-gray-400 text-sm text-center">
          Sign in to continue your training plan.
        </p>
      </div>

      <div *ngIf="messageService.message$ | async as msg" class="mb-4 text-center text-sm text-primary font-semibold">
        {{ msg }}
      </div>

      <form (ngSubmit)="onLogin()" class="flex flex-col gap-5">
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-gray-600 dark:text-gray-300 uppercase">Username</label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">person</span>
            <input class="w-full pl-11 pr-4 py-4 bg-white dark:bg-[#1b1f27] border rounded-xl text-sm focus:ring-1 focus:ring-primary outline-none"
              type="text" name="username" [(ngModel)]="username" placeholder="username" required />
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-bold text-gray-600 dark:text-gray-300 uppercase">Password</label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">lock</span>
            <input
              class="w-full pl-12 pr-12 py-4 bg-white dark:bg-[#1b1f27] border rounded-xl text-sm focus:ring-1 focus:ring-primary outline-none"
              [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="password" placeholder="password" required />
            <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"
              (mousedown)="showPasswordPress()" (mouseup)="hidePasswordPress()" (mouseleave)="hidePasswordPress()">
              <span class="material-symbols-outlined">{{ showPassword ? 'visibility' : 'visibility_off' }}</span>
            </button>
          </div>
        </div>

        <button class="w-full bg-primary text-white font-bold py-4 rounded-xl transition-all disabled:opacity-70" [disabled]="loading">
          {{ loading ? 'Logging...' : 'Login' }}
        </button>
      </form>

      <p class="text-center mt-8 text-sm text-gray-500">
        Don&apos;t have an account?
        <a routerLink="/register" class="font-bold text-primary ml-1">Create Account</a>
      </p>
    </section>
  </div>
</div>
