<!-- Bottom Navigation -->
<div class="fixed bottom-0 left-0 right-0 z-50 px-2 sm:px-4 pb-[max(10px,env(safe-area-inset-bottom))] lg:px-8 lg:pb-4">

  @if (fabOpen) {
  <button
    class="fixed inset-0 z-40 bg-black/20"
    aria-label="Fechar menu rapido"
    (click)="closeFab()">
  </button>
  }

  <div class="relative mx-auto w-full max-w-5xl bg-white/90 dark:bg-[#101622]/90 backdrop-blur-xl border border-gray-200 dark:border-gray-800 rounded-2xl shadow-lg z-50">
    <div class="px-3 sm:px-6 py-3 flex justify-between items-end">
      <button routerLink="/home" routerLinkActive="text-primary"
        class="flex flex-col items-center gap-1.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors min-w-12 group">
        <span class="material-symbols-outlined text-[24px]">dashboard</span>
        <span class="text-[10px] font-bold">Home</span>
      </button>

      <button routerLink="/history" routerLinkActive="text-primary"
        class="flex flex-col items-center gap-1.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors min-w-12 group">
        <span class="material-symbols-outlined text-[24px] group-hover:-translate-y-0.5 transition-transform">history</span>
        <span class="text-[10px] font-medium">History</span>
      </button>

      <div class="relative -top-5">
        @if (fabOpen) {
        <div class="absolute bottom-0 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
          <button
            class="pointer-events-auto absolute -translate-x-1/2 -translate-y-[104px] h-12 w-12 rounded-full bg-emerald-500 text-white text-[10px] font-bold shadow-lg hover:bg-emerald-600 transition"
            style="left: 50%; top: 0;"
            (click)="openTrainList()">
            Iniciar
          </button>
          <button
            class="pointer-events-auto absolute -translate-x-1/2 -translate-y-[82px] h-12 w-12 rounded-full bg-slate-900 text-white text-[10px] font-bold shadow-lg hover:bg-black transition dark:bg-slate-100 dark:text-slate-900"
            style="left: calc(50% - 72px); top: 0;"
            (click)="startManualWorkout()"
            [disabled]="startingManual">
            @if (startingManual) {
            ...
            } @else {
            Livre
            }
          </button>
          <button
            class="pointer-events-auto absolute -translate-x-1/2 -translate-y-[82px] h-12 w-12 rounded-full bg-orange-500 text-white text-[10px] font-bold shadow-lg hover:bg-orange-600 transition"
            style="left: calc(50% + 72px); top: 0;"
            (click)="openCreatePlannedWorkout()">
            Criar
          </button>
        </div>
        }

        <button
          (click)="toggleFab()"
          aria-label="Abrir acoes de treino"
          class="bg-primary text-white h-12 w-12 sm:h-14 sm:w-14 rounded-full shadow-[0_8px_16px_rgba(37,106,244,0.4)] flex items-center justify-center active:scale-95 transition-transform ring-4 ring-background-light dark:ring-background-dark">
          @if (fabOpen) {
          <span class="material-symbols-outlined text-[28px] sm:text-[32px]">close</span>
          } @else {
          <span class="material-symbols-outlined text-[28px] sm:text-[32px]">fitness_center</span>
          }
        </button>
      </div>

      <button routerLink="/profile" routerLinkActive="text-primary"
        class="flex flex-col items-center gap-1.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors min-w-12 group">
        <span class="material-symbols-outlined text-[24px] group-hover:-translate-y-0.5 transition-transform">person</span>
        <span class="text-[10px] font-medium">Profile</span>
      </button>

      <button routerLink="/settings" routerLinkActive="text-primary"
        class="flex flex-col items-center gap-1.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors min-w-12 group">
        <span class="material-symbols-outlined text-[24px] group-hover:-translate-y-0.5 transition-transform">settings</span>
        <span class="text-[10px] font-medium">Settings</span>
      </button>
    </div>
  </div>
</div>
